name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y gcc valgrind cppcheck

      - name: Run tests
        run: make test

      - name: Run tests with ASAN/UBSan
        run: make asan

      - name: Run tests under Valgrind
        run: |
          make test
          valgrind --leak-check=full --error-exitcode=1 ./test_bin

      - name: Static analysis (cppcheck)
        run: cppcheck --enable=all --error-exitcode=1 --suppress=missingIncludeSystem src/
